<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuation Intelligence | Quintes Capital</title>
    <link rel="icon" href="https://quintes.com.br/wp-content/uploads/2023/07/Favicon-Quintes.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: radial-gradient(circle at top right, #0a192f, #02060c);
            color: #FFFFFF; 
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Evita scroll desnecessário na landing */
        }

        /* Animação Cinematográfica */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .page { 
            display: none; 
            height: 100vh; 
            width: 100vw;
            animation: fadeIn 1.5s ease-out forwards; 
        }

        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Landing Page - Sem GAPs */
        .hero-container { 
            text-align: center; 
            max-width: 900px; 
            padding: 0 20px;
            margin-top: -5vh; /* Ajuste fino para centralização visual perfeita */
        }

        .logo-main { width: 220px; height: auto; margin-bottom: 40px; }

        .hero-title {
            font-weight: 800; font-size: clamp(2.5rem, 5vw, 3.8rem); letter-spacing: -2px; line-height: 1.1;
            margin-bottom: 20px; background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .subheadline { font-size: 1.2rem; color: #a8b2d1; margin-bottom: 45px; font-weight: 300; max-width: 600px; margin-left: auto; margin-right: auto; }

        /* Botão Premium */
        .btn-premium {
            background: linear-gradient(90deg, #1e40af 0%, #3b82f6 100%);
            color: white; border: none; padding: 20px 60px; border-radius: 50px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
            text-decoration: none;
        }
        .btn-premium:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(59, 130, 246, 0.5); }

        /* Powered By Section */
        .footer-powered { margin-top: 80px; text-align: center; }
        .powered-text { font-size: 0.65rem; letter-spacing: 3px; color: #475569; text-transform: uppercase; margin-bottom: 15px; }
        .footer-logo { width: 200px; filter: brightness(0) invert(1); opacity: 0.8; }

        /* Iframe Fullscreen */
        #iframe-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: none; 
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Card de Resultado (Etapa 3) */
        .res-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            padding: 60px 40px; margin: 40px 0; width: 100%; max-width: 700px;
        }
        .res-value { font-size: clamp(3rem, 8vw, 5rem); font-weight: 800; letter-spacing: -3px; margin: 10px 0; }
        
        .grid-passos { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; 
            width: 100%; max-width: 900px; margin-top: 20px;
        }
        .btn-small { padding: 15px 20px; font-size: 0.8rem; border-radius: 12px; }

        @media (max-width: 768px) {
            .grid-passos { grid-template-columns: 1fr; }
            body { overflow-y: auto; }
            .page { height: auto; padding: 40px 0; }
        }
    </style>
</head>
<body>

    <!-- ETAPA 1: LANDING PAGE -->
    <div id="etapa1" class="page active">
        <div class="hero-container">
            <!-- Logo com Fallback de Erro -->
            <img src="https://quintes.com.br/wp-content/uploads/2023/07/Logo-Branca-Simbolo-Preto-Texto.png" 
                 class="logo-main" alt="Quintes Capital" onerror="this.style.display='none'">
            
            <p style="color:#3b82f6; font-weight:700; letter-spacing:3px; font-size:0.8rem; text-transform:uppercase;">Estratégia & Inteligência</p>
            <h1 class="hero-title">Quanto vale o esforço<br>de uma vida inteira?</h1>
            <p class="subheadline">Descubra o valor de mercado real da sua empresa com inteligência de dados e metodologia de M&A.</p>
            
            <button class="btn-premium" onclick="irParaEtapa2()">CALCULAR VALUATION</button>
            
            <div class="footer-powered">
                <p class="powered-text">Powered by</p>
                <img src="https://i.imgur.com/8N4U9M6.png" class="footer-logo" alt="Quintes Advisory">
            </div>
        </div>
    </div>

    <!-- ETAPA 2: FORMULÁRIO EM TELA CHEIA -->
    <div id="iframe-container">
        <iframe id="fillout-frame" src="https://forms.fillout.com/t/1qwGDDvuKKus" allow="camera; microphone; geolocation"></iframe>
    </div>

    <!-- ETAPA 3: RESULTADO -->
    <div id="etapa3" class="page">
        <div class="hero-container">
            <img src="https://quintes.com.br/wp-content/uploads/2023/07/Logo-Branca-Simbolo-Preto-Texto.png" width="140" alt="Logo">
            
            <div class="res-card">
                <div id="res-empresa" style="color: #3b82f6; font-weight:700; letter-spacing:3px; text-transform:uppercase; font-size:0.8rem;">Avaliação Estimada</div>
                <div class="res-value">
                    <span style="font-size:1.8rem; color:#64748b; margin-right:10px;">R$</span><span id="res-valor">0</span>
                </div>
                <p style="color:#64748b; font-size:1.1rem;">Baseado em Múltiplo Setorial de <b>6.0x EBITDA</b></p>
            </div>
            
            <h2 style="font-size:1.8rem; font-weight:700; margin-bottom:30px;">Próximos Passos Estratégicos</h2>
            <div class="grid-passos">
                <button class="btn-premium btn-small">BAIXAR RELATÓRIO</button>
                <button class="btn-premium btn-small">VER DASHBOARD</button>
                <button class="btn-premium btn-small">FALAR COM ADVISOR</button>
            </div>
            
            <button onclick="window.location.href=window.location.pathname" style="margin-top:40px; background:none; border:none; color:#64748b; cursor:pointer; text-decoration:underline; font-size:0.9rem;">REFAZER DIAGNÓSTICO</button>
        </div>
    </div>

    <script>
        // 1. Lógica para detectar parâmetros da URL (vindo do redirecionamento do Fillout)
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const ebitda = urlParams.get('ebitda');
            const empresa = urlParams.get('empresa');

            if (ebitda) {
                mostrarEtapa3(ebitda, empresa);
            }
        };

        function irParaEtapa2() {
            document.getElementById('etapa1').style.display = 'none';
            document.getElementById('iframe-container').style.display = 'block';
        }

        function mostrarEtapa3(ebitda, empresa) {
            // Esconde Landing e Iframe
            document.getElementById('etapa1').style.display = 'none';
            document.getElementById('iframe-container').style.display = 'none';
            
            // Ativa Etapa 3
            const etapa3 = document.getElementById('etapa3');
            etapa3.classList.add('active');
            
            // Cálculo
            const valorCalculado = parseFloat(ebitda) * 6;
            document.getElementById('res-valor').innerText = valorCalculado.toLocaleString('pt-BR');
            if(empresa) {
                document.getElementById('res-empresa').innerText = `Avaliação Estimada • ${empresa}`;
            }
        }
    </script>
</body>
</html>
